[build]
  command = "npm run build"
  publish = "dist"

# ── SPA Routing (React Router için zorunlu) ──────────────────────────────────
# Tüm URL'leri index.html'e yönlendir; 404 olmadan çalışsın
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Güvenlik HTTP Başlıkları ──────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Clickjack koruması
    X-Frame-Options = "DENY"
    # MIME sniffing koruması
    X-Content-Type-Options = "nosniff"
    # Referrer sızıntı koruması
    Referrer-Policy = "strict-origin-when-cross-origin"
    # İzin verilen kaynak politikası (CSP)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      media-src 'self' blob:;
      connect-src 'self'
        https://szfzmznxeiwxseixyefa.supabase.co
        wss://szfzmznxeiwxseixyefa.supabase.co
        https://denemeazim10.app.n8n.cloud
        https://resiniferous-gymnastically-aidan.ngrok-free.dev;
    """
    # HSTS (HTTPS zorunluluğu)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
